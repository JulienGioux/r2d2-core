services:
  postgres:
    image: ankane/pgvector:v0.7.0 # PostgreSQL 16+ avec pgvector natif
    container_name: r2d2-postgres
    environment:
      POSTGRES_USER: r2d2_admin
      POSTGRES_PASSWORD: secure_r2d2_password_local
      POSTGRES_DB: r2d2_blackboard
    ports:
      - "5432:5432"
    volumes:
      - r2d2_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r2d2_admin -d r2d2_blackboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  r2d2_pgdata:
