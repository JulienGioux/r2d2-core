<script>
function showTab(btn, index) {
    const msg = btn.closest('.message-content');
    const tabs = msg.querySelectorAll('.tab-content');
    const btns = msg.querySelectorAll('.view-toggles button');
    tabs.forEach(t => t.style.display = 'none');
    btns.forEach(b => { b.style.background = 'transparent'; b.style.color = '#888'; });
    tabs[index].style.display = 'block';
    btn.style.background = 'var(--bg-tertiary)';
    btn.style.color = '#fff';
}
</script>
