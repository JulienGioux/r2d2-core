<div id="debate-config-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);" onclick="if(event.target.id === 'debate-config-modal') this.remove();">
    <div class="glass-card" style="padding: 32px; width: 450px; max-width: 90vw; position: relative;">
        <button onclick="document.getElementById('debate-config-modal').remove()" style="position: absolute; right: 16px; top: 16px; background: transparent; color: var(--text-tertiary); border: none; font-size: 24px; cursor: pointer;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-tertiary)'">&times;</button>
        <h2 style="margin-top: 0; color: var(--accent-color); font-weight: 500;"><i data-lucide="git-compare" style="display: inline-block; vertical-align: middle; margin-right: 8px;"></i> Configuration du Débat</h2>
        
        <form hx-post="/api/chat/history/{{ id }}/debate_config" hx-target="#debate-config-modal" hx-swap="outerHTML" style="display: flex; flex-direction: column; gap: 16px; margin-top: 24px;">
            
            <div>
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Architecte Principal</label>
                <select name="architect_provider" class="raw-input" style="width: 100%; display: block; box-sizing: border-box; cursor: pointer;">
                    <option value="gemini-2.5-pro" {% if architect_provider == "gemini-2.5-pro" %}selected{% endif %}>Gemini 2.5 Pro (Google)</option>
                    <option value="mistral-large-latest" {% if architect_provider == "mistral-large-latest" %}selected{% endif %}>Mistral Large 2 (Mistral AI)</option>
                </select>
                <small style="color: var(--text-tertiary); display: block; margin-top: 4px;">Modèle A : Rédige et corrige l'architecture.</small>
            </div>

            <div>
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Avocat du Diable (Red Teamer)</label>
                <select name="red_teamer_provider" class="raw-input" style="width: 100%; display: block; box-sizing: border-box; cursor: pointer;">
                    <option value="mistral-large-latest" {% if red_teamer_provider == "mistral-large-latest" %}selected{% endif %}>Mistral Large 2 (Mistral AI)</option>
                    <option value="gemini-2.5-pro" {% if red_teamer_provider == "gemini-2.5-pro" %}selected{% endif %}>Gemini 2.5 Pro (Google)</option>
                </select>
                <small style="color: var(--text-tertiary); display: block; margin-top: 4px;">Modèle B : Critique de manière impitoyable.</small>
            </div>

            <div>
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Tours maximum (limite API)</label>
                <input type="number" name="max_rounds" min="1" max="6" value="{{ max_rounds }}" class="raw-input" style="width: 100%; display: block; box-sizing: border-box;">
                <small style="color: var(--text-tertiary); display: block; margin-top: 4px;">Un tour = 1 proposition + 1 critique + 1 correction.</small>
            </div>

            <div style="margin-top: 16px;">
                <button type="submit" class="btn-primary" style="width: 100%;">Enregistrer pour cette Session</button>
            </div>
        </form>
    </div>
    <script>if(typeof lucide !== 'undefined') lucide.createIcons();</script>
</div>
