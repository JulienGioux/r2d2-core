<div id="new-session-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);" onclick="if(event.target.id === 'new-session-modal') this.remove();">
    <div class="glass-card" style="padding: 32px; width: 550px; max-width: 90vw; position: relative;">
        <button onclick="document.getElementById('new-session-modal').remove()" style="position: absolute; right: 16px; top: 16px; background: transparent; color: var(--text-tertiary); border: none; font-size: 24px; cursor: pointer;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-tertiary)'">&times;</button>
        <h2 id="modal-title" style="margin-top: 0; color: var(--accent-color); font-weight: 500;"><i data-lucide="plus-circle" style="display: inline-block; vertical-align: middle; margin-right: 8px;"></i> Nouvelle Session & Workspace</h2>
        
        <form hx-post="/api/chat/new" hx-target="#ag-editor-target" hx-indicator="#new-session-spinner" hx-on::before-request="if(window.TerminalManager) window.TerminalManager.hideTerminal()" hx-on::after-request="document.getElementById('new-session-modal').remove(); document.getElementById('ag-terminal-section').style.display = 'flex';" style="display: flex; flex-direction: column; gap: 16px; margin-top: 24px;" onclick="event.stopPropagation()">
            
            <div>
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Nom de la session</label>
                <input type="text" name="title" placeholder="Ex: Refactorisation Auth..." required class="raw-input" style="width: 100%; display: block; box-sizing: border-box;">
            </div>

            <div>
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Dépôt Cible (Liaison au Workspace)</label>
                <select id="repo-select" name="repository" class="raw-input" onchange="updateWorkflowUI()" style="width: 100%; display: block; box-sizing: border-box; cursor: pointer; background-color: rgba(20,20,30,0.8); border: 1px solid var(--panel-border);">
                    <option value="none" style="background: var(--jules-sidebar-bg);">-- Aucun (Session Simple) --</option>
                    {% for repo in repos %}
                    <option value="{{ repo }}" style="background: var(--jules-sidebar-bg);">{{ repo }}</option>
                    {% endfor %}
                </select>
                <small style="color: var(--text-tertiary); display: block; margin-top: 4px;">Récupéré dynamiquement depuis GitHub API.</small>
                
                <label id="rag-option" style="display: none; align-items: center; gap: 8px; cursor: pointer; margin-top: 12px;">
                    <input type="checkbox" name="auto_rag" value="true" checked>
                    <span style="color: var(--text-primary); font-size: 13px;">Auto-indexer les sources de ce dépôt au RAG de la session</span>
                </label>
            </div>

            <div id="git-workflow" style="display: none; gap: 16px;">
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Action Initiale</label>
                    <select name="git_action" class="raw-input" style="width: 100%; display: block; box-sizing: border-box; cursor: pointer; background: rgba(0,0,0,0.4);">
                        <option value="none" style="background: var(--jules-sidebar-bg);">Ne pas cloner (Déjà existant ou à ignorer)</option>
                        <option value="sync" style="background: var(--jules-sidebar-bg);">Git Sync / Pull (Mettre à jour)</option>
                        <option value="clone" style="background: var(--jules-sidebar-bg);">Git Clone (Environnement vierge)</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Auth</label>
                    <select name="auth_method" class="raw-input" style="width: 100%; display: block; box-sizing: border-box; cursor: pointer; background: rgba(0,0,0,0.4);">
                        <option value="https" style="background: var(--jules-sidebar-bg);">HTTPS Bridge</option>
                        <option value="ssh" style="background: var(--jules-sidebar-bg);">SSH PTY</option>
                    </select>
                </div>
            </div>
            
            <details style="margin-top: 12px; border: 1px solid var(--panel-border); padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.1);">
                <summary id="adv-summary" style="cursor: pointer; color: var(--text-secondary); font-size: 12px; user-select: none;">Options Sandbox Avancées</summary>
                
                <div style="margin-top: 16px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Image conteneur Sandbox</label>
                    <input type="text" name="base_image" value="fedora:latest" class="raw-input" style="width: 100%; display: block; box-sizing: border-box; background: rgba(0,0,0,0.4);">
                </div>
            </details>

            <div style="margin-top: 16px;">
                <button type="submit" class="btn-primary" style="width: 100%; position: relative;">
                    <span id="submit-text">Créer la Session</span>
                    <i id="new-session-spinner" data-lucide="loader-2" class="htmx-indicator" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; animation: spin 1s linear infinite;"></i>
                </button>
            </div>
        </form>
    </div>
    <style>
        .htmx-request #submit-text { opacity: 0.5; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        @keyframes spin { 100% { transform: translateY(-50%) rotate(360deg); } }
    </style>
    <script>
        if(typeof lucide !== 'undefined') lucide.createIcons();
        
        function updateWorkflowUI() {
            var val = document.getElementById('repo-select').value;
            var gitWf = document.getElementById('git-workflow');
            var ragOpt = document.getElementById('rag-option');
            var btnText = document.getElementById('submit-text');
            var title = document.getElementById('modal-title');
            var icon = document.getElementById('modal-icon');
            var advText = document.getElementById('adv-summary');

            if (val === 'none') {
                gitWf.style.display = 'none';
                ragOpt.style.display = 'none';
                btnText.textContent = 'Créer la Session';
                if(title) title.innerHTML = '<i data-lucide="message-square" style="display: inline-block; vertical-align: middle; margin-right: 8px;"></i> Nouvelle Session';
                advText.textContent = "Options Sandbox Avancées";
            } else {
                gitWf.style.display = 'flex';
                ragOpt.style.display = 'flex';
                btnText.textContent = 'Lier & Créer le Workspace';
                if(title) title.innerHTML = '<i data-lucide="layers" style="display: inline-block; vertical-align: middle; margin-right: 8px;"></i> Nouveau Workspace';
                advText.textContent = "Configuration Sandbox & Réseau";
            }
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }
        
        // Init at load
        updateWorkflowUI();
    </script>
</div>
