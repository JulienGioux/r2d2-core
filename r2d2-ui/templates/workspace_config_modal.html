<div id="workspace-config-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);" onclick="if(event.target.id === 'workspace-config-modal') this.remove();">
    <div class="glass-card" style="padding: 32px; width: 500px; max-width: 90vw; position: relative;">
        <button onclick="document.getElementById('workspace-config-modal').remove()" style="position: absolute; right: 16px; top: 16px; background: transparent; color: var(--text-tertiary); border: none; font-size: 24px; cursor: pointer;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-tertiary)'">&times;</button>
        <h2 style="margin-top: 0; color: var(--accent-color); font-weight: 500;"><i data-lucide="server" style="display: inline-block; vertical-align: middle; margin-right: 8px;"></i> Paramètres Workspace</h2>
        
        <form hx-post="/api/chat/current/workspace_config" hx-target="#workspace-config-modal" hx-swap="outerHTML" style="display: flex; flex-direction: column; gap: 16px; margin-top: 24px;">
            
            <div>
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Image Podman (Ex: fedora:latest)</label>
                <input type="text" name="base_image" value="{{ base_image }}" class="raw-input" style="width: 100%; display: block; box-sizing: border-box;">
                <small style="color: var(--text-tertiary); display: block; margin-top: 4px;">Image nativement tirée par `podman run`.</small>
            </div>

            <div>
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px;">Script de Démarrage (Optionnel)</label>
                <textarea name="startup_script" rows="4" class="raw-input" placeholder="apt-get update && apt-get install python3 -y" style="width: 100%; display: block; box-sizing: border-box; resize: vertical; font-family: monospace;">{{ startup_script }}</textarea>
                <small style="color: var(--text-tertiary); display: block; margin-top: 4px;">Exécuté une seule fois lors de la création du conteneur isolant.</small>
            </div>

            <div style="margin-top: 16px;">
                <button type="submit" class="btn-primary" style="width: 100%;">Confirmer pour cette Session</button>
            </div>
        </form>
    </div>
    <script>if(typeof lucide !== 'undefined') lucide.createIcons();</script>
</div>
